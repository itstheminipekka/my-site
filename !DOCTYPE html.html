<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Full Screen Image</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background-color: #000; /* fills any empty space */
    display: flex;
    justify-content: center;
    align-items: center;
  }
  img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* fills the screen, cropping if necessary */
    display: block;
  }
</style>
</head>
<body>
  <img src="447be50d-1.png" alt="Full Screen">
</body>
</html>
